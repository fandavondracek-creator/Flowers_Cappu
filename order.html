<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Květiny Cappu</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #d8bfd8;
      color: white;
    }

    .hero {
      height: 20vh;
      background-image: url("rgy_bg.jpg");
      background-size: cover;
      background-position: center;

      -webkit-mask-image: radial-gradient(circle, black 70%, transparent 100%);
      mask-image: radial-gradient(circle, black 70%, transparent 100%);

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 18px;
      backdrop-filter: blur(10px);
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }

    .under_menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 10vh;
    }

    .under_menu h1 {
      margin-bottom: 20px;
    }

    /* ===== FORM STYL ===== */
    form {
      width: 100%;
      max-width: 400px;
    }

    label {
      display: flex;
      flex-direction: column; /* 👈 text nad input */
      margin-bottom: 15px;
      text-align: left;
      font-size: 18px;
    }

    input,
    textarea {
      margin-top: 8px;
      padding: 10px;
      border-radius: 10px;

      background: rgba(255, 255, 255, 0.5); /* 👈 poloprůhledné */
      border: 1px solid rgba(255, 255, 255, 0.3);

      color: black;
      outline: none;
      backdrop-filter: blur(6px);
    }

    input:focus,
    textarea:focus {
      background: rgba(255, 255, 255, 0.75);
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;

      background: rgba(0,0,0,0.6);
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    button[type="submit"]:hover {
      background: rgba(0,0,0,0.8);
      transform: scale(1.03);
    }

  </style>
</head>

<body>

  <div class="hero"></div>

  <div class="menu">
    <a href="about.html"><button class="btn">O nás</button></a>
    <a href="products.html"><button class="btn">Produkty</button></a>
    <a href="contacts.html"><button class="btn">Kontakty</button></a>
    <a href="index.html"><button class="btn">Domů</button></a>
  </div>

  <div class="under_menu">
    <h1>Objednat Pivoňky</h1>

    <form action="https://formspree.io/f/xvzjrpwp" method="POST">

      <label>
        Vaše emailová adresa:
        <input type="email" name="email" required>
      </label>

      <label>
        Počet kusů:
        <textarea name="message" required></textarea>
      </label>

      <button type="submit">Objednat</button>

    </form>
  </div>

</body>
</html>
