<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Květiny Cappu</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #d8bfd8;
      color: white;
    }

    .hero {
      height: 20vh;
      background-image: url("rgy_bg.jpg");
      background-size: cover;
      background-position: center;
      
  -webkit-mask-image: radial-gradient(circle, black 70%, transparent 100%);
  mask-image: radial-gradient(circle, black 70%, transparent 100%);
      
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      padding: 20px;
    }

    .under_menu{
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      
    padding-left: 10vh;
    padding-right: 10vh;
    text-align: center;
      
    }

    
    .under_menu h1 {
      margin: 0;
      font-size: 35px;
    }

    .under_menu p {
      margin-top: 10px;
      font-size: 25px;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }


        .btn {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 10px 18px;
  backdrop-filter: blur(10px);
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
  }
  
  .btn:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.05);
  }

    
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  max-width: 30vw;
  margin: 0 auto;
}

.item {
  background: rgba(189,183,107,0.3);
  padding: 15px;
  border-radius: 12px;
}

.item img {
  width: 100%;
  height: 150px;        /* všechny obrázky stejně vysoké */
  object-fit: cover;    /* ořízne místo deformace */
  border-radius: 8px;
}
    
    .special {
  border: 2px solid gold;
}
    
  </style>
</head>

<body>

  <div class="hero">

  </div>

  <div class="menu">
    <a href="about.html"><button class="btn">O nás</button></a>
    <a href="products.html"><button class="btn">Produkty</button></a>
    <a href="contacts.html"><button class="btn">Kontakty</button></a>
    <a href="index.html"><button class="btn">Domů</button></a>
  </div>

<div class="under_menu">
  <h1>Objednat Pivoňky</h1>
  <form
  action="https://formspree.io/f/xvzjrpwp"
  method="POST"
>
    
  <p>Vaše emailová adresa:</p>
  <label>
    <input type="email" name="email">
  </label>

  <p>Počet kusů</p>
  <label>
    <textarea name="message"></textarea>
  </label>
    
  <button type="submit">Objednat</button>
</form>
</div>
    
  </div>
</div>

</body>
</html>
