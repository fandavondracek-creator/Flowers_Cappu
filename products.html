<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Květiny Cappu</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #d8bfd8;
      color: white;
    }

    .hero {
      height: 20vh;
      background-image: url("rgy_bg.jpg");
      background-size: cover;
      background-position: center;
      
  -webkit-mask-image: radial-gradient(circle, black 70%, transparent 100%);
  mask-image: radial-gradient(circle, black 70%, transparent 100%);
      
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      padding: 20px;
    }

    .under_menu{
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      
    padding-left: 50vh;
    padding-right: 50vh;
    text-align: center;
      
    }

    
    .under_menu h1 {
      margin: 0;
      font-size: 35px;
    }

    .under_menu p {
      margin-top: 10px;
      font-size: 25px;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }


        .btn {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 10px 18px;
  backdrop-filter: blur(10px);
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
  }
  
  .btn:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.05);
  }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.item {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
  background: white;
}
    
.item img {
  width: 100%;
  height: 150px;        /* všechny obrázky stejně vysoké */
  object-fit: cover;    /* ořízne místo deformace */
  border-radius: 8px;
}

.item h3 {
  margin: 10px 0 5px;
}

.item p {
  margin: 5px 0;
}
    
    .special {
  border: 2px solid gold;
}
    
  </style>
</head>

<body>

  <div class="hero">

  </div>
